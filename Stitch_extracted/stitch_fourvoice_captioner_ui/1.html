<!-- Ensure shader handles its own styling internally based on context, 
                 but we give it a container to constrain its size. -->
<!-- STITCH_SHADER_START:ANIMATION_2 class="absolute inset-0 w-full h-full object-contain pointer-events-none filter drop-shadow-[0_0_15px_rgba(255,185,85,0.1)]" -->
<div class="absolute inset-0 w-full h-full object-contain pointer-events-none filter drop-shadow-[0_0_15px_rgba(255,185,85,0.1)]" style="display:block;">
<canvas id="shader-canvas-ANIMATION_2" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_2');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;

uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;

varying vec2 v_texCoord;

// Simplex noise or similar wave function to create a pulsing waveform
float wave(vec2 uv, float phase, float freq, float amp) {
    float d = abs(uv.y - 0.5 + sin(uv.x * freq + phase) * amp);
    return smoothstep(0.015, 0.0, d);
}

void main() {
    vec2 uv = v_texCoord;
    
    // Base amber color from design system: #F0A93E -> vec3(0.94, 0.66, 0.24)
    vec3 amber = vec3(0.941, 0.663, 0.243);
    
    float t = u_time * 2.0;
    
    // Wave parameters
    float freq = 10.0;
    float amp = 0.05 * (0.5 + 0.5 * sin(t * 0.5));
    
    // Create multiple waves that "split" or merge
    // During processing, we can simulate the "split into four" transition
    // For now, let's create a dynamic multi-line pulse
    
    float w1 = wave(uv, t, freq, amp);
    float w2 = wave(uv, t * 1.1 + 1.0, freq * 0.8, amp * 0.7);
    float w3 = wave(uv, t * 0.9 - 0.5, freq * 1.2, amp * 0.9);
    float w4 = wave(uv, t * 1.2 + 2.0, freq * 1.1, amp * 0.6);
    
    float combined = max(max(w1, w2), max(w3, w4));
    
    // Add horizontal fade
    combined *= smoothstep(0.0, 0.2, uv.x) * smoothstep(1.0, 0.8, uv.x);
    
    vec3 color = amber * combined;
    
    // Background is Carbon Ink (#0F1210) but we want transparency for layering
    gl_FragColor = vec4(color, combined);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const statusLabel = document.getElementById('statusLabel');
            const progressBar = document.getElementById('progressBar');
            
            const states = [
                { text: 'Transcribing audio...', progress: 15, duration: 2500 },
                { text: 'Analyzing visual content...', progress: 35, duration: 3000 },
                { text: 'Generating four styles...', progress: 60, duration: 4000 },
                { text: 'Self-checking accuracy...', progress: 85, duration: 2500 },
                { text: 'Finalizing...', progress: 98, duration: 1500 },
                { text: 'Complete', progress: 100, duration: 500 }
            ];

            let currentStateIndex = 0;

            function updateState() {
                if (currentStateIndex >= states.length) return;

                const state = states[currentStateIndex];
                
                // Fade out text
                statusLabel.style.opacity = '0';
                
                setTimeout(() => {
                    // Update text and fade back in
                    statusLabel.textContent = state.text;
                    statusLabel.style.opacity = '1';
                    
                    // Update progress bar
                    progressBar.style.width = `${state.progress}%`;
                    
                    // Add glow effect if nearing completion
                    if (state.progress > 90) {
                        progressBar.style.boxShadow = '0 0 12px rgba(255, 201, 130, 0.6)';
                    }
                }, 300); // Wait for fade out

                setTimeout(() => {
                    currentStateIndex++;
                    updateState();
                }, state.duration);
            }

            // Start the sequence after a brief delay
            setTimeout(updateState, 1000);
        });
    </script>
