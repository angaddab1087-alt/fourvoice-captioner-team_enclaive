<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

            darkMode: "class",

                extend: {
                    "colors": {

                        "on-secondary": "#003921",
                        "on-tertiary-fixed-variant": "#484740",

                        "surface-container-high": "#282b28",
                        "on-primary-container": "#654000",
                        "inverse-surface": "#e1e3df",
                        "inverse-on-surface": "#2e312f",
                        "primary-container": "#f0a93e",
                        "on-tertiary-container": "#494842",
                        "outline": "#9e8e7c",
                        "secondary-fixed": "#95f6bf",
                        "background": "#111412",
                        "tertiary-fixed-dim": "#cac6be",
                        "primary": "#ffc982",
                        "tertiary": "#d6d2ca",
                        "surface-container": "#1d201e",
                        "surface-container-highest": "#323533",
                        "on-secondary-container": "#9bfcc4",
                        "outline-variant": "#514536",
                        "surface-bright": "#373a37",
                        "on-primary-fixed": "#291800",
                        "tertiary-container": "#bab7af",
                        "on-primary": "#452b00",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#633f00",
                        "surface-container-low": "#191c1a",
                        "on-surface-variant": "#d6c4b0",
                        "on-secondary-fixed": "#002111",
                        "surface-tint": "#ffb955",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "secondary-fixed-dim": "#79daa4",
                        "secondary-container": "#00784b",
                        "surface-container-lowest": "#0c0f0d",
                        "surface-dim": "#111412",
                        "on-background": "#e1e3df",
                        "surface": "#111412",
                        "inverse-primary": "#835500",
                        "tertiary-fixed": "#e6e2d9",
                        "on-surface": "#e1e3df",
                        "primary-fixed-dim": "#ffb955",
                        "on-secondary-fixed-variant": "#005232",
                        "secondary": "#79daa4",
                        "primary-fixed": "#ffddb4",
                        "on-tertiary": "#31302b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {

                        "gutter": "24px",

                        "container-max": "1440px",
                        "unit": "4px"

                    "fontFamily": {

                    "fontSize": {

                        "emphasis-italic": ["18px", { "lineHeight": "1.5", "fontWeight": "400" }],

                }
            }

<style>
        .upload-glow:hover {
            box-shadow: 0 0 20px 2px rgba(240, 169, 62, 0.15);
            border-color: #f0a93e !important;
        }
        .magnetic-button {
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .magnetic-button:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Shell (Hidden Navigation since it's an entry point/upload screen, but brand anchor remains) -->
<header class="w-full flex justify-between items-center px-margin-mobile md:px-margin-desktop py-6 absolute top-0 z-10">
<div class="text-headline-md font-headline-md text-primary tracking-tighter">FourVoice</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop w-full max-w-container-max mx-auto py-24">
<!-- Header Section -->
<div class="text-center mb-12 max-w-2xl space-y-4">
<h1 class="text-display-lg-mobile md:text-display-lg font-display-lg-mobile md:font-display-lg text-on-surface">FourVoice</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Upload a clip. Get four caption styles — formal, sarcastic, tech-humor, and everyday-humor — generated automatically.</p>
</div>
<!-- Upload Zone -->
<div class="w-full max-w-3xl border-2 border-dashed border-outline-variant rounded-[24px] bg-surface-container-low p-12 md:p-20 flex flex-col items-center justify-center text-center cursor-pointer transition-all duration-300 upload-glow mb-12 relative overflow-hidden group" id="upload-zone">
<div class="absolute inset-0 bg-primary-container/0 group-hover:bg-primary-container/5 transition-colors duration-300 pointer-events-none"></div>
<span class="material-symbols-outlined text-[48px] text-on-surface-variant group-hover:text-primary transition-colors duration-300 mb-6" data-icon="cloud_upload">cloud_upload</span>
<div class="text-headline-md font-headline-md mb-2 text-on-surface">Drag &amp; Drop Video</div>
<div class="text-label-caps font-label-caps text-on-surface-variant mb-6 uppercase tracking-widest">MP4, MOV up to 2GB</div>
<button class="px-8 py-3 rounded-full border border-outline hover:border-primary text-on-surface hover:text-primary transition-colors duration-200 text-body-md font-body-md">Browse file</button>
<input accept="video/mp4,video/quicktime" class="hidden" id="file-input" type="file"/>
</div>
<!-- Action Button -->
<button class="magnetic-button bg-primary-container text-on-primary-container px-12 py-4 rounded-full text-headline-md font-headline-md shadow-[0_0_15px_rgba(240,169,62,0.1)] hover:shadow-[0_0_25px_rgba(240,169,62,0.3)] transition-all flex items-center space-x-2">
<span>Analyze Video</span>
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
</button>
</main>
<script>
        // Simple drag and drop interaction simulation
        const dropZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('click', () => fileInput.click());

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.add('border-primary', 'bg-surface-variant');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.remove('border-primary', 'bg-surface-variant');
            }, false);
        });

        // Magnetic button effect
        const magneticBtn = document.querySelector('.magnetic-button');
        magneticBtn.addEventListener('mousemove', (e) => {
            const rect = magneticBtn.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            magneticBtn.style.transform = `translate(${x * 0.1}px, ${y * 0.1}px) scale(1.02)`;
        });

        magneticBtn.addEventListener('mouseleave', () => {
            magneticBtn.style.transform = 'translate(0px, 0px) scale(1)';
        });
    </script>
</body></html>
